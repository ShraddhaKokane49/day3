name: custom-nginx-image-builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t custom-nginx ./nginx-demo

      - name: Run Container
        run: docker run -d -p 8080:80 --name nginx-container custom-nginx

  logs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Show Containers
        run: docker ps

      - name: Show Logs
        run: docker logs nginx-container

  deploy:
    runs-on: ubuntu-latest
    needs: logs

    steps:
      - name: Curl Application
        run: curl http://localhost:8080